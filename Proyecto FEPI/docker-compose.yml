services:

  db:
    image: postgres:18
    container_name: postgres_db

    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  backend:
    build:
      context: ./backend

    container_name: django_backend

    restart: always

    env_file:
      - .env

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

  frontend:
    build:
      context: ./frontend

    container_name: react_frontend

    restart: always

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: